# Node.js Tutorial HTTP Server - Production-Grade Nginx Reverse Proxy Configuration
#
# This configuration implements enterprise-grade reverse proxy patterns for the Node.js
# tutorial application, featuring SSL/TLS termination, comprehensive security headers,
# upstream load balancing, health monitoring integration, caching strategies, and
# operational monitoring while maintaining educational clarity.
#
# Key Features:
# - Production-ready upstream configuration with health checks
# - SSL/TLS termination with modern security protocols
# - Comprehensive security headers and protection mechanisms
# - Multi-tier caching strategy for performance optimization
# - Rate limiting and DDoS protection
# - Structured logging for operational visibility
# - Health monitoring integration with Node.js application
# - Load balancing with automatic failover capabilities
#
# Dependencies:
# - Node.js Tutorial Application (app:3000) - upstream server
# - SSL certificates in /etc/ssl/ directory
# - Docker Compose network: production_default
# - PM2 cluster management for Node.js application
#
# Version: 1.24 (nginx:1.24-alpine)
# Compatible with: Node.js 22.x LTS, Docker Compose, Kubernetes

# Main context configuration - global Nginx settings
user nginx;                                    # Run as nginx user for security isolation
worker_processes auto;                         # Auto-detect CPU cores for optimal worker scaling
error_log /var/log/nginx/error.log warn;      # Error logging with production-appropriate level
pid /var/run/nginx.pid;                        # Process ID file for service management

# Events context - connection processing optimization
events {
    worker_connections 1024;                   # Maximum connections per worker process
    use epoll;                                 # Efficient event notification for Linux
    multi_accept on;                           # Accept multiple connections simultaneously
    accept_mutex off;                          # Disable accept mutex for better performance
}

# HTTP context configuration - main application settings
http {
    # MIME types and basic HTTP configuration
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance optimization settings
    sendfile on;                               # Efficient file transmission using sendfile()
    tcp_nopush on;                            # Optimize TCP packet transmission
    tcp_nodelay on;                           # Disable Nagle's algorithm for lower latency
    keepalive_timeout 65;                     # HTTP keep-alive timeout for connection reuse
    keepalive_requests 1000;                  # Maximum requests per keep-alive connection
    
    # Client request configuration
    client_max_body_size 10m;                # Maximum request body size (aligned with app config)
    client_body_timeout 120s;                # Request body timeout
    client_header_timeout 60s;               # Request header timeout
    client_body_buffer_size 16k;             # Client body buffer size
    client_header_buffer_size 1k;            # Client header buffer size
    large_client_header_buffers 4 8k;        # Large header buffer configuration

    # Gzip compression for bandwidth optimization
    gzip on;
    gzip_vary on;                             # Add Vary: Accept-Encoding header
    gzip_min_length 1000;                     # Minimum file size for compression
    gzip_comp_level 6;                        # Balanced compression level
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_disable "msie6";                     # Disable gzip for IE6

    # Rate limiting configuration for DDoS protection
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=health:1m rate=1r/s;
    limit_req_zone $binary_remote_addr zone=burst:10m rate=100r/s;

    # Connection limiting for resource protection
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_conn_zone $server_name zone=perserver:10m;

    # Cache path configuration for performance optimization
    proxy_cache_path /var/cache/nginx/app
        levels=1:2
        keys_zone=app_cache:10m
        max_size=100m
        inactive=1h
        use_temp_path=off;

    proxy_cache_path /var/cache/nginx/health
        levels=1
        keys_zone=health_cache:1m
        max_size=10m
        inactive=5m
        use_temp_path=off;

    # Custom log format with timing and upstream information
    log_format combined_with_timing '$remote_addr - $remote_user [$time_local] '
                                   '"$request" $status $body_bytes_sent '
                                   '"$http_referer" "$http_user_agent" '
                                   'rt=$request_time uct="$upstream_connect_time" '
                                   'uht="$upstream_header_time" urt="$upstream_response_time" '
                                   'cs=$upstream_cache_status';

    # JSON log format for structured logging and monitoring integration
    log_format json_log escape=json '{'
                       '"time":"$time_iso8601",'
                       '"remote_addr":"$remote_addr",'
                       '"request":"$request",'
                       '"status":$status,'
                       '"body_bytes_sent":$body_bytes_sent,'
                       '"http_referer":"$http_referer",'
                       '"http_user_agent":"$http_user_agent",'
                       '"request_time":$request_time,'
                       '"upstream_response_time":"$upstream_response_time",'
                       '"upstream_connect_time":"$upstream_connect_time",'
                       '"upstream_header_time":"$upstream_header_time",'
                       '"upstream_cache_status":"$upstream_cache_status"'
                       '}';

    # Access logging configuration with buffering for performance
    access_log /var/log/nginx/access.log combined_with_timing buffer=32k flush=5s;
    access_log /var/log/nginx/access-json.log json_log buffer=32k flush=5s;

    # Hide Nginx version for security
    server_tokens off;

    # Upstream server configuration for Node.js tutorial application
    upstream nodejs_tutorial_backend {
        # Load balancing method - least_conn for optimal distribution
        least_conn;
        
        # Node.js application server (Docker Compose service name: app, port: 3000)
        server app:3000 max_fails=3 fail_timeout=30s weight=1;
        
        # Additional upstream servers can be added here for horizontal scaling
        # server app2:3000 max_fails=3 fail_timeout=30s weight=1 backup;
        
        # Keepalive connections to upstream servers for performance
        keepalive 32;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    # Map for cache status headers
    map $upstream_cache_status $cache_header {
        MISS     "MISS";
        HIT      "HIT";
        EXPIRED  "EXPIRED";
        STALE    "STALE";
        UPDATING "UPDATING";
        REVALIDATED "REVALIDATED";
        default  "BYPASS";
    }

    # HTTP Server Block - Port 80 with HTTPS redirect and basic functionality
    server {
        # Listen configuration for HTTP traffic
        listen 80 default_server;
        listen [::]:80 default_server ipv6only=on;
        
        # Server name configuration
        server_name _;
        
        # Security and logging configuration
        server_tokens off;
        access_log /var/log/nginx/access.log combined_with_timing;
        error_log /var/log/nginx/error.log warn;

        # Rate limiting and connection limiting
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        limit_conn perip 20;
        limit_conn perserver 1000;

        # Security headers for HTTP responses
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Cache-Status $cache_header always;

        # Redirect HTTP to HTTPS for security (except health checks)
        location / {
            # Allow health checks on HTTP for load balancers
            if ($uri !~ ^/health$) {
                return 301 https://$server_name$request_uri;
            }
            
            # Health endpoint proxy for HTTP load balancer health checks
            proxy_pass http://nodejs_tutorial_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Health check specific configuration
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Health response caching (5 second TTL)
            proxy_cache health_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_valid 503 1s;
            proxy_cache_key "$uri$is_args$args";
            proxy_cache_bypass $http_pragma $http_authorization;
            proxy_cache_revalidate on;
            
            # Health check logging optimization
            access_log off;
            log_not_found off;
        }

        # Health endpoint for load balancer health checks
        location = /health {
            proxy_pass http://nodejs_tutorial_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Health check timeouts (aligned with application config)
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Health response caching with 5-second TTL
            proxy_cache health_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_valid 503 1s;
            proxy_cache_key "$uri$is_args$args";
            proxy_ignore_headers Cache-Control Expires;
            add_header X-Cache-Status $upstream_cache_status always;
            
            # Allow unrestricted access for health monitoring
            allow all;
            access_log off;
            log_not_found off;
        }

        # Security - block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
    }

    # HTTPS Server Block - Port 443 with SSL/TLS termination and full functionality
    server {
        # Listen configuration for HTTPS traffic with HTTP/2 support
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server ipv6only=on;
        
        # Server name configuration
        server_name _;
        
        # SSL/TLS configuration with modern security protocols
        ssl_certificate /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/private/server.key;
        
        # SSL session configuration for performance
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;
        
        # SSL protocols and cipher configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # SSL stapling for certificate validation
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;
        
        # Security and logging configuration
        server_tokens off;
        access_log /var/log/nginx/access-ssl.log combined_with_timing;
        error_log /var/log/nginx/error-ssl.log warn;

        # Rate limiting and connection limiting
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        limit_conn perip 20;
        limit_conn perserver 1000;

        # HTTPS Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header X-Cache-Status $cache_header always;

        # Main application proxy configuration
        location / {
            # Proxy configuration for Node.js backend
            proxy_pass http://nodejs_tutorial_backend;
            proxy_http_version 1.1;
            
            # Proxy headers for client information preservation
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-SSL on;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header Connection "";
            
            # Proxy timeout configuration (aligned with Node.js app config)
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 60s;
            
            # Proxy buffering for performance optimization
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
            proxy_temp_file_write_size 8k;
            
            # Application response caching (1 minute TTL for hello endpoint)
            proxy_cache app_cache;
            proxy_cache_valid 200 1m;
            proxy_cache_valid 404 1m;
            proxy_cache_valid any 5s;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_bypass $http_pragma $http_authorization;
            proxy_cache_revalidate on;
            proxy_cache_min_uses 1;
            add_header X-Cache-Status $upstream_cache_status always;
            
            # Response headers for application identification
            add_header X-Served-By "Nginx Reverse Proxy" always;
            add_header X-Response-Time $upstream_response_time always;
        }

        # Hello endpoint with specific optimization
        location = /hello {
            # Rate limiting for hello endpoint
            limit_req zone=api burst=10 nodelay;
            
            proxy_pass http://nodejs_tutorial_backend/hello;
            proxy_http_version 1.1;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-SSL on;
            proxy_set_header Connection "";
            
            # Optimized timeouts for hello endpoint (faster response expected)
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Enhanced caching for hello endpoint
            proxy_cache app_cache;
            proxy_cache_valid 200 2m;
            proxy_cache_key "$scheme$request_method$host$request_uri$is_args$args";
            proxy_cache_bypass $http_pragma;
            add_header X-Cache-Status $upstream_cache_status always;
            add_header Cache-Control "public, max-age=60" always;
            
            # Hello endpoint specific headers
            add_header X-Endpoint "Hello Tutorial Endpoint" always;
            add_header X-Tutorial-Version "1.0.0" always;
        }

        # Health endpoint with monitoring optimization
        location = /health {
            # Reduced rate limiting for health checks
            limit_req zone=health burst=5 nodelay;
            
            proxy_pass http://nodejs_tutorial_backend/health;
            proxy_http_version 1.1;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            
            # Health check specific timeouts (aligned with app health timeout: 10s)
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # Health response caching with 5-second TTL (aligned with app cache TTL)
            proxy_cache health_cache;
            proxy_cache_valid 200 5s;
            proxy_cache_valid 503 1s;
            proxy_cache_key "$uri$is_args$args";
            proxy_ignore_headers Cache-Control Expires;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status always;
            
            # Health endpoint specific headers
            add_header X-Health-Check "Nginx-Proxied" always;
            add_header X-Check-Timestamp $time_iso8601 always;
            
            # Optimized logging for health checks
            access_log /var/log/nginx/health.log combined_with_timing;
            log_not_found off;
        }

        # Static assets optimization (for future extensibility)
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            # Aggressive caching for static assets
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            
            # Try files first, then proxy to backend if not found
            try_files $uri @proxy_backend;
            
            # Disable logging for static assets
            access_log off;
            log_not_found off;
        }

        # Fallback location for static assets not found locally
        location @proxy_backend {
            proxy_pass http://nodejs_tutorial_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
        }

        # Security - block access to hidden files and directories
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Security - block access to sensitive files
        location ~* \.(env|log|bak|backup|conf|cfg|ini)$ {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # Robots.txt handling (for SEO and crawlers)
        location = /robots.txt {
            add_header Content-Type text/plain;
            return 200 "User-agent: *\nDisallow: /\n";
            access_log off;
        }

        # Favicon handling to prevent 404 errors
        location = /favicon.ico {
            add_header Content-Type image/x-icon;
            expires 30d;
            access_log off;
            log_not_found off;
            return 204;
        }
    }

    # Additional server block for handling non-SNI clients or direct IP access
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        
        # Catch-all server name for direct IP access
        server_name "";
        
        # SSL configuration (reuse certificates)
        ssl_certificate /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/private/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        
        # Return 444 (connection closed) for requests to IP address or invalid host
        return 444;
    }
}

